<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angular CRUD — Documentation Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #dd0031;
    --red-dim: #a80024;
    --dark: #0f0f14;
    --panel: #16161f;
    --card: #1e1e2a;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #7070a0;
    --accent: #7c4dff;
    --green: #00e676;
    --yellow: #ffd740;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Cairo', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRID NOISE BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(221,0,49,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(221,0,49,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,20,.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: -.02em;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--red);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: grid; place-items: center;
    font-size: .65rem; font-weight: 700; color: white;
    font-family: var(--mono);
  }

  /* ─── SEARCH ─── */
  .search-wrap {
    flex: 1;
    max-width: 520px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .55rem 1rem .55rem 2.8rem;
    color: var(--text);
    font-family: var(--sans);
    font-size: .9rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-wrap input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(221,0,49,.15);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: .9rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: .9rem;
    pointer-events: none;
  }
  .result-count {
    font-size: .75rem;
    color: var(--muted);
    font-family: var(--mono);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .result-count span { color: var(--red); }

  /* ─── LAYOUT ─── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 64px);
    position: relative;
    z-index: 1;
  }

  /* ─── SIDEBAR ─── */
  aside {
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-label {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--muted);
    padding: 0 1.25rem;
    margin-bottom: .75rem;
    text-transform: uppercase;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .65rem 1.25rem;
    cursor: pointer;
    transition: background .15s, color .15s;
    border-right: 2px solid transparent;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,.04); }
  .nav-item.active {
    background: rgba(221,0,49,.1);
    border-right-color: var(--red);
    color: white;
  }
  .nav-num {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--red);
    background: rgba(221,0,49,.15);
    border-radius: 4px;
    padding: .1rem .35rem;
    flex-shrink: 0;
    min-width: 28px;
    text-align: center;
  }
  .nav-text {
    font-size: .82rem;
    color: var(--muted);
    transition: color .15s;
    line-height: 1.3;
  }
  .nav-item.active .nav-text,
  .nav-item:hover .nav-text { color: var(--text); }
  .nav-item.hidden { display: none; }

  /* ─── MAIN CONTENT ─── */
  main {
    padding: 2.5rem 3rem;
    max-width: 900px;
  }

  /* ─── SECTION ─── */
  .section { display: none; animation: fadeIn .3s ease; }
  .section.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── SECTION HEADER ─── */
  .sec-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .sec-num {
    font-family: var(--mono);
    font-size: 3rem;
    font-weight: 600;
    color: var(--red);
    opacity: .4;
    line-height: 1;
    flex-shrink: 0;
  }
  .sec-title { font-size: 1.6rem; font-weight: 900; line-height: 1.2; }
  .sec-sub { font-size: .85rem; color: var(--muted); margin-top: .3rem; }

  /* ─── H2, H3 ─── */
  .doc-h2 {
    font-size: 1.15rem;
    font-weight: 700;
    color: white;
    margin: 2rem 0 1rem;
    display: flex;
    align-items: center;
    gap: .6rem;
  }
  .doc-h2::before {
    content: '';
    display: block;
    width: 4px; height: 1.15rem;
    background: var(--red);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .doc-h3 {
    font-size: 1rem;
    font-weight: 700;
    color: #9b8dff;
    margin: 1.5rem 0 .75rem;
  }

  /* ─── PARAGRAPH ─── */
  .doc-p {
    font-size: .9rem;
    color: #b0b0c8;
    line-height: 1.8;
    margin-bottom: .75rem;
  }

  /* ─── CODE BLOCK ─── */
  .code-block {
    background: #0a0a10;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 1rem 0;
    overflow: hidden;
    position: relative;
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,.04);
    border-bottom: 1px solid var(--border);
    padding: .5rem 1rem;
  }
  .code-lang {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--red);
    font-weight: 600;
    letter-spacing: .08em;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: .65rem;
    padding: .2rem .5rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
  }
  .copy-btn:hover { border-color: var(--red); color: var(--red); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }
  pre {
    padding: 1.25rem 1.5rem;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: .8rem;
    line-height: 1.7;
    color: #c8d0e8;
  }
  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .cm { color: #546e7a; font-style: italic; }
  .dec { color: var(--red); }
  .typ { color: #ffcb6b; }
  .num { color: #f78c6c; }

  /* ─── TABLE ─── */
  .doc-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: .85rem;
  }
  .doc-table th {
    background: rgba(221,0,49,.15);
    color: var(--red);
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .06em;
    padding: .6rem 1rem;
    text-align: right;
    border: 1px solid var(--border);
  }
  .doc-table td {
    padding: .6rem 1rem;
    border: 1px solid var(--border);
    color: #b0b0c8;
    vertical-align: top;
  }
  .doc-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }

  /* ─── NOTE BOX ─── */
  .note-box {
    background: rgba(124,77,255,.08);
    border: 1px solid rgba(124,77,255,.3);
    border-right: 3px solid var(--accent);
    border-radius: 8px;
    padding: .9rem 1.2rem;
    font-size: .85rem;
    color: #b0b0d8;
    margin: 1rem 0;
    line-height: 1.7;
  }
  .note-box.success {
    background: rgba(0,230,118,.06);
    border-color: rgba(0,230,118,.3);
    border-right-color: var(--green);
    color: #a0d8b0;
  }
  .note-box.warning {
    background: rgba(255,215,64,.06);
    border-color: rgba(255,215,64,.3);
    border-right-color: var(--yellow);
    color: #d8c880;
  }

  /* ─── BULLET ─── */
  .bullet-list { list-style: none; margin: .75rem 0; }
  .bullet-list li {
    display: flex; gap: .6rem;
    font-size: .87rem; color: #b0b0c8;
    padding: .3rem 0; line-height: 1.6;
  }
  .bullet-list li::before {
    content: '▸';
    color: var(--red);
    flex-shrink: 0;
    margin-top: .05rem;
  }

  /* ─── SEARCH HIGHLIGHT ─── */
  mark {
    background: rgba(221,0,49,.35);
    color: white;
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ─── SEARCH RESULTS VIEW ─── */
  #search-results { display: none; }
  #search-results.visible { display: block; }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    background: var(--red);
    opacity: 0;
    transition: opacity .2s;
  }
  .result-card:hover { border-color: var(--red); transform: translateX(-2px); }
  .result-card:hover::before { opacity: 1; }
  .result-section { font-family: var(--mono); font-size: .7rem; color: var(--red); margin-bottom: .3rem; }
  .result-title { font-size: .95rem; font-weight: 700; color: white; margin-bottom: .4rem; }
  .result-snippet { font-size: .82rem; color: var(--muted); line-height: 1.6; }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .no-results .big { font-size: 3rem; margin-bottom: 1rem; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { position: static; height: auto; }
    main { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">ng</div>
    <span>Angular Docs</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن أي موضوع... مثلاً: routing, service, model" autocomplete="off" />

  <div class="result-count" id="resultCount"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside>

    <!-- Sections rendered by JS -->
    <div id="sections-container"></div>
  </main>
</div>

      <p class="doc-p">في الـ Eager Loading كل الـ components بتتحمل مرة واحدة وقت ما التطبيق يشتغل — حتى لو المستخدم مفتحش الصفحة دي. ده بيبطّئ الـ initial load.</p>

      <p class="doc-p">مع الـ Lazy Loading، كل component بيتحمل بس لما المستخدم يفتح الـ route بتاعته. ده بيقلل حجم الـ initial bundle بشكل كبير.</p>
      <div class="code-block">

<span class="cm">// ✅ مفيش imports فوق — كل component بيتحمل عند الطلب فقط</span>

<span class="kw">export const</span> routes: <span class="typ">Routes</span> = [

      </div>
      <div class="note-box">💡 <strong>loadComponent</strong> متاحة من Angular 14+ مع الـ Standalone Components. كل component بيتحمل في chunk منفصل في الـ build.</div>

        <pre><span class="cm">// app.routes.ts — الـ Root Routes</span>

<span class="cm">// features/items/items.routes.ts — الـ Child Routes</span>
<span class="kw">export const</span> <span class="typ">ITEMS_ROUTES</span>: <span class="typ">Routes</span> = [
  { path: <span class="str">''</span>, <span class="fn">loadComponent</span>: () => <span class="kw">import</span>(<span class="str">'./item-list.component'</span>).then(m => m.<span class="typ">ItemListComponent</span>) },

  { path: <span class="str">'edit/:id'</span>, <span class="fn">loadComponent</span>: () => <span class="kw">import</span>(<span class="str">'./item-edit.component'</span>).then(m => m.<span class="typ">ItemEditComponent</span>) },
];</pre>
      </div>

      <div class="doc-h2">Preloading Strategy — تحميل ذكي في الخلفية</div>
      <p class="doc-p">بدل ما تستنى المستخدم يفتح الـ route، ممكن تخلي Angular تحمّل الـ lazy chunks في الخلفية بعد ما الـ app يقوم:</p>

        <div class="code-header"><span class="code-lang">TypeScript — app.config.ts</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { PreloadAllModules, provideRouter, withPreloading } <span class="kw">from</span> <span class="str">'@angular/router'</span>;

<span class="kw">export const</span> appConfig: <span class="typ">ApplicationConfig</span> = {
  providers: [
    <span class="fn">provideRouter</span>(
      routes,
      <span class="fn">withPreloading</span>(<span class="typ">PreloadAllModules</span>)  <span class="cm">// ← يحمّل كل الـ chunks في الخلفية</span>
    ),

    id: "guards",
    num: "06.5",
    title: "Route Guards",
    sub: "حماية الـ Routes وتقييد الوصول",
    tags: ["guard", "canactivate", "candeactivate", "canmatch", "auth", "protect", "حماية", "صلاحيات", "جارد"],
    content: `
      <div class="doc-h2">ما هو الـ Guard؟</div>
      <p class="doc-p">الـ Route Guard هو function بتشتغل قبل ما Angular تنقل المستخدم للـ route — وبتقرر: هيكمل ولا هيتحول لصفحة تانية. أشهر استخدام هو منع الـ users الغير مسجّلين من الوصول لصفحات معينة.</p>
      <ul class="bullet-list">
        <li><strong>canActivate</strong> — هل يقدر يفتح الـ route ده؟</li>
        <li><strong>canDeactivate</strong> — هل يقدر يسيب الـ route ده؟ (مفيد لـ unsaved changes)</li>
        <li><strong>canMatch</strong> — هل الـ route ده ينطبق أصلاً على الـ URL؟</li>
        <li><strong>resolve</strong> — جلب بيانات قبل فتح الصفحة</li>
      </ul>

      <div class="doc-h2">إنشاء Auth Guard</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">BASH</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="cm"># إنشاء guard باستخدام CLI</span>
ng generate guard guards/auth

<span class="cm"># هينشئ الملف:</span>
<span class="cm"># src/app/guards/auth.guard.ts</span></pre>
      </div>

      <div class="doc-h2">canActivate — منع الدخول بدون Login</div>
      <p class="doc-p">أشهر guard — بيشيك لو المستخدم مسجّل دخول ولا لأ:</p>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">TypeScript — auth.guard.ts</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { <span class="typ">CanActivateFn</span> } <span class="kw">from</span> <span class="str">'@angular/router'</span>;
<span class="kw">import</span> { <span class="fn">inject</span> } <span class="kw">from</span> <span class="str">'@angular/core'</span>;
<span class="kw">import</span> { Router } <span class="kw">from</span> <span class="str">'@angular/router'</span>;

<span class="kw">export const</span> <span class="fn">authGuard</span>: <span class="typ">CanActivateFn</span> = (route, state) => {
  <span class="kw">const</span> router = <span class="fn">inject</span>(<span class="typ">Router</span>);
  <span class="kw">const</span> token = localStorage.<span class="fn">getItem</span>(<span class="str">'auth_token'</span>);

  <span class="kw">if</span> (token) {
    <span class="kw">return true</span>;   <span class="cm">// ✅ مسجّل — اسمحله يدخل</span>
  }

  <span class="cm">// ❌ مش مسجّل — روّحه على Login وحفظ الـ URL المطلوب</span>
  <span class="kw">return</span> router.<span class="fn">createUrlTree</span>(
    [<span class="str">'/login'</span>],
    { queryParams: { returnUrl: state.url } }
  );
};</pre>
      </div>

      <div class="doc-h2">canActivate مع Service — الطريقة الأقوى</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">TypeScript — auth.guard.ts (مع AuthService)</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { <span class="typ">CanActivateFn</span> } <span class="kw">from</span> <span class="str">'@angular/router'</span>;
<span class="kw">import</span> { <span class="fn">inject</span> } <span class="kw">from</span> <span class="str">'@angular/core'</span>;
<span class="kw">import</span> { <span class="typ">AuthService</span> } <span class="kw">from</span> <span class="str">'../services/auth.service'</span>;
<span class="kw">import</span> { Router } <span class="kw">from</span> <span class="str">'@angular/router'</span>;

<span class="kw">export const</span> <span class="fn">authGuard</span>: <span class="typ">CanActivateFn</span> = () => {
  <span class="kw">const</span> auth   = <span class="fn">inject</span>(<span class="typ">AuthService</span>);
  <span class="kw">const</span> router = <span class="fn">inject</span>(<span class="typ">Router</span>);

  <span class="kw">if</span> (auth.<span class="fn">isLoggedIn</span>()) <span class="kw">return true</span>;

  <span class="kw">return</span> router.<span class="fn">createUrlTree</span>([<span class="str">'/login'</span>]);
};

<span class="cm">// ─── Role Guard — للصلاحيات ──────────────────────────</span>
<span class="kw">export const</span> <span class="fn">adminGuard</span>: <span class="typ">CanActivateFn</span> = () => {
  <span class="kw">const</span> auth   = <span class="fn">inject</span>(<span class="typ">AuthService</span>);
  <span class="kw">const</span> router = <span class="fn">inject</span>(<span class="typ">Router</span>);

  <span class="kw">if</span> (auth.<span class="fn">hasRole</span>(<span class="str">'admin'</span>)) <span class="kw">return true</span>;

  <span class="kw">return</span> router.<span class="fn">createUrlTree</span>([<span class="str">'/forbidden'</span>]);
};</pre>
      </div>

      <div class="doc-h2">canDeactivate — تحذير عند مغادرة الصفحة</div>
      <p class="doc-p">مفيد جداً لو المستخدم عنده تغييرات غير محفوظة في فورم:</p>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">TypeScript — unsaved-changes.guard.ts</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { <span class="typ">CanDeactivateFn</span> } <span class="kw">from</span> <span class="str">'@angular/router'</span>;

<span class="cm">// Interface تتطبقها الـ components اللي عايزة الحماية</span>
<span class="kw">export interface</span> <span class="typ">CanComponentDeactivate</span> {
  <span class="fn">canDeactivate</span>(): <span class="typ">boolean</span>;
}

<span class="kw">export const</span> <span class="fn">unsavedChangesGuard</span>: <span class="typ">CanDeactivateFn</span>&lt;<span class="typ">CanComponentDeactivate</span>&gt; =
  (component) => {
    <span class="kw">if</span> (component.<span class="fn">canDeactivate</span>()) <span class="kw">return true</span>;

    <span class="kw">return</span> <span class="fn">confirm</span>(<span class="str">'عندك تغييرات غير محفوظة — هتسيبها؟'</span>);
  };

<span class="cm">// ─── في الـ Component ─────────────────────────────────</span>
<span class="kw">export class</span> <span class="typ">ItemCreateComponent</span> <span class="kw">implements</span> <span class="typ">CanComponentDeactivate</span> {
  form = <span class="kw">this</span>.fb.<span class="fn">group</span>({ title: [<span class="str">''</span>] });

  <span class="fn">canDeactivate</span>(): <span class="typ">boolean</span> {
    <span class="kw">return</span> <span class="kw">this</span>.form.pristine;  <span class="cm">// true لو مش فيه تغييرات</span>
  }
}</pre>
      </div>

      <div class="doc-h2">تطبيق الـ Guards على الـ Routes</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">TypeScript — app.routes.ts</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { authGuard, adminGuard } <span class="kw">from</span> <span class="str">'./guards/auth.guard'</span>;
<span class="kw">import</span> { unsavedChangesGuard } <span class="kw">from</span> <span class="str">'./guards/unsaved-changes.guard'</span>;

<span class="kw">export const</span> routes: <span class="typ">Routes</span> = [
  <span class="cm">// صفحة عامة — بدون guard</span>
  { path: <span class="str">'login'</span>, <span class="fn">loadComponent</span>: () => <span class="kw">import</span>(<span class="str">'./pages/login.component'</span>).then(m => m.<span class="typ">LoginComponent</span>) },

  <span class="cm">// صفحة محمية — لازم يكون logged in</span>
  {
    path: <span class="str">'items'</span>,
    canActivate: [authGuard],
    <span class="fn">loadComponent</span>: () => <span class="kw">import</span>(<span class="str">'./components/item-list/item-list.component'</span>).then(m => m.<span class="typ">ItemListComponent</span>)
  },

  <span class="cm">// صفحة فيها فورم — حماية من المغادرة بدون حفظ</span>
  {
    path: <span class="str">'items/create'</span>,
    canActivate: [authGuard],
    canDeactivate: [unsavedChangesGuard],
    <span class="fn">loadComponent</span>: () => <span class="kw">import</span>(<span class="str">'./components/item-create/item-create.component'</span>).then(m => m.<span class="typ">ItemCreateComponent</span>)
  },

    content: `
      <div class="doc-h2">ما هو الـ Interceptor؟</div>
      <p class="doc-p">الـ HTTP Interceptor بيسمحلك تعترض كل request وresponse بيعدي في تطبيقك وتعمل عليه حاجات قبل أو بعد ما يوصل للـ API — من غير ما تكرر الكود في كل service.</p>
      <ul class="bullet-list">
        <li>إضافة Authorization Token تلقائياً لكل request</li>
        <li>إظهار Loading Spinner عند كل request</li>
        <li>معالجة الأخطاء مركزياً (401، 403، 500)</li>
        <li>Logging لكل الـ requests في الـ development</li>
      </ul>

      <div class="doc-h2">إنشاء الـ Interceptor</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">BASH</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="cm"># إنشاء interceptor باستخدام CLI</span>
ng g interceptor interceptors/auth

<span class="cm"># هينشئ ملف:</span>
<span class="cm"># src/app/interceptors/auth.interceptor.ts</span></pre>
      </div>

      <div class="doc-h2">Auth Interceptor — إضافة Token</div>
      <p class="doc-p">أشهر استخدام للـ Interceptor هو إضافة الـ JWT Token تلقائياً لكل request:</p>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">TypeScript — auth.interceptor.ts</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { HttpInterceptorFn } <span class="kw">from</span> <span class="str">'@angular/common/http'</span>;

<span class="cm">// Functional Interceptor (Angular 15+)</span>
<span class="kw">export const</span> <span class="fn">authInterceptor</span>: <span class="typ">HttpInterceptorFn</span> = (req, next) => {
  <span class="cm">// جلب الـ token من localStorage</span>
  <span class="kw">const</span> token = localStorage.<span class="fn">getItem</span>(<span class="str">'auth_token'</span>);

  <span class="cm">// لو مفيش token، ابعت الـ request عادي</span>
  <span class="kw">if</span> (!token) <span class="kw">return</span> <span class="fn">next</span>(req);

  <span class="cm">// استنساخ الـ request مع إضافة الـ Authorization header</span>
  <span class="kw">const</span> authReq = req.<span class="fn">clone</span>({
    headers: req.headers.<span class="fn">set</span>(<span class="str">'Authorization'</span>, <span class="str">\`Bearer \${token}\`</span>)
  });

  <span class="kw">return</span> <span class="fn">next</span>(authReq);
};</pre>
      </div>

      <div class="doc-h2">Error Interceptor — معالجة الأخطاء مركزياً</div>
      <div class="code-block">
        <div class="code-header"><span class="code-lang">TypeScript — error.interceptor.ts</span><button class="copy-btn" onclick="copyCode(this)">نسخ</button></div>
        <pre><span class="kw">import</span> { HttpInterceptorFn, HttpErrorResponse } <span class="kw">from</span> <span class="str">'@angular/common/http'</span>;
<span class="kw">import</span> { <span class="fn">catchError</span>, <span class="fn">throwError</span> } <span class="kw">from</span> <span class="str">'rxjs'</span>;
<span class="kw">import</span> { <span class="fn">inject</span> } <span class="kw">from</span> <span class="str">'@angular/core'</span>;
<span class="kw">import</span> { Router } <span class="kw">from</span> <span class="str">'@angular/router'</span>;

<span class="kw">export const</span> <span class="fn">errorInterceptor</span>: <span class="typ">HttpInterceptorFn</span> = (req, next) => {
  <span class="kw">const</span> router = <span class="fn">inject</span>(<span class="typ">Router</span>);

  <span class="kw">return</span> <span class="fn">next</span>(req).<span class="fn">pipe</span>(
    <span class="fn">catchError</span>((error: <span class="typ">HttpErrorResponse</span>) => {
      <span class="kw">switch</span> (error.status) {
        <span class="kw">case</span> <span class="num">401</span>:
          <span class="cm">// غير مصادق — روّح لصفحة Login</span>
          localStorage.<span class="fn">removeItem</span>(<span class="str">'auth_token'</span>);
          router.<span class="fn">navigate</span>([<span class="str">'/login'</span>]);
          <span class="kw">break</span>;
        <span class="kw">case</span> <span class="num">403</span>:
          <span class="cm">// مش مصرحلك — Forbidden</span>
          router.<span class="fn">navigate</span>([<span class="str">'/forbidden'</span>]);
          <span class="kw">break</span>;
        <span class="kw">case</span> <span class="num">500</span>:
          <span class="cm">// خطأ في السيرفر</span>
          console.<span class="fn">error</span>(<span class="str">'Server Error:'</span>, error.message);
          <span class="kw">break</span>;
      }
      <span class="kw">return</span> <span class="fn">throwError</span>(() => error);
    })
  );
};</pre>

<span class="kw">import</span> { <span class="fn">inject</span> } <span class="kw">from</span> <span class="str">'@angular/core'</span>;
<span class="kw">import</span> { <span class="fn">finalize</span> } <span class="kw">from</span> <span class="str">'rxjs'</span>;
<span class="kw">import</span> { <span class="typ">LoadingService</span> } <span class="kw">from</span> <span class="str">'../services/loading.service'</span>;

<span class="kw">export const</span> <span class="fn">loadingInterceptor</span>: <span class="typ">HttpInterceptorFn</span> = (req, next) => {
  <span class="kw">const</span> loadingService = <span class="fn">inject</span>(<span class="typ">LoadingService</span>);

  loadingService.<span class="fn">show</span>();   <span class="cm">// ← أظهر الـ spinner</span>

  <span class="kw">return</span> <span class="fn">next</span>(req).<span class="fn">pipe</span>(
    <span class="fn">finalize</span>(() => loadingService.<span class="fn">hide</span>())  <span class="cm">// ← أخفه دايماً بعد الانتهاء</span>
  );
};

<span class="cm">// ─── Loading Service مطلوب للـ Interceptor ────────────────</span>
<span class="dec">@Injectable</span>({ providedIn: <span class="str">'root'</span> })
<span class="kw">export class</span> <span class="typ">LoadingService</span> {
  isLoading$ = <span class="kw">new</span> <span class="typ">BehaviorSubject</span>&lt;<span class="typ">boolean</span>&gt;(<span class="kw">false</span>);
  <span class="fn">show</span>() { <span class="kw">this</span>.isLoading$.<span class="fn">next</span>(<span class="kw">true</span>); }
  <span class="fn">hide</span>() { <span class="kw">this</span>.isLoading$.<span class="fn">next</span>(<span class="kw">false</span>); }

<span class="kw">import</span> { CommonModule } <span class="kw">from</span> <span class="str">'@angular/common'</span>;

  nav.className = 'nav-item' + (sec.id === activeId ? ' active' : '');
  nav.dataset.id = sec.id;
  nav.innerHTML = `<span class="nav-num">${sec.num}</span><span class="nav-text">${sec.title}</span>`;
  nav.addEventListener('click', () => { searchInput.value = ''; clearSearch(); setActive(sec.id); });
  navList.appendChild(nav);

  const div = document.createElement('div');
  div.className = 'section' + (sec.id === activeId ? ' visible' : '');
  div.id = 'sec-' + sec.id;
  div.innerHTML = `
    <div class="sec-header">
      <div class="sec-num">${sec.num}</div>
      <div><div class="sec-title">${sec.title}</div><div class="sec-sub">${sec.sub}</div></div>
    </div>
    ${sec.content}`;
  sectionsContainer.appendChild(div);
});

function setActive(id) {
  activeId = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.id === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('visible', s.id === 'sec-' + id));
  searchResults.classList.remove('visible');
  sectionsContainer.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearSearch() {
  searchResults.classList.remove('visible');
  sectionsContainer.style.display = 'block';
  resultCount.innerHTML = '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('hidden'));
}

function highlight(text, q) {
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function stripHtml(html) {
  const d = document.createElement('div'); d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { clearSearch(); setActive(activeId); return; }

  sectionsContainer.style.display = 'none';
  searchResults.classList.add('visible');

  const matches = [];
  SECTIONS.forEach(sec => {
    const text = stripHtml(sec.content).toLowerCase();
    if (sec.title.toLowerCase().includes(q) || sec.tags.some(t => t.includes(q)) || text.includes(q)) {
      const idx = text.indexOf(q);
      const start = Math.max(0, idx - 60);
      const end = Math.min(text.length, idx + 120);
      const snippet = idx >= 0
        ? (start > 0 ? '...' : '') + text.slice(start, end) + '...'
        : stripHtml(sec.content).slice(0, 140) + '...';
      matches.push({ sec, snippet });
    }
  });

  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('hidden', !matches.some(m => m.sec.id === n.dataset.id)));

  resultCount.innerHTML = `<span>${matches.length}</span> نتيجة`;

  if (!matches.length) {
    resultsContainer.innerHTML = `<div class="no-results"><div class="big">🔍</div><div style="font-size:1.1rem;color:var(--text);margin-bottom:.5rem">مفيش نتايج لـ "${q}"</div><div style="font-size:.85rem">جرّب: routing، service، model، interceptor</div></div>`;
    return;
  }

  resultsContainer.innerHTML = matches.map(({ sec, snippet }) => `
    <div class="result-card" onclick="goToSection('${sec.id}')">
      <div class="result-section">SECTION ${sec.num}</div>
      <div class="result-title">${highlight(sec.title, q)}</div>
      <div class="result-snippet">${highlight(snippet, q)}</div>
    </div>`).join('');
});

function goToSection(id) { searchInput.value = ''; clearSearch(); setActive(id); }

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = '✓ تم'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 2000);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
  if (e.key === 'Escape') { searchInput.blur(); searchInput.value = ''; clearSearch(); setActive(activeId); }
});
</script>
</body>
</html>
